name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mhc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx turbo db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mhc_test

      - name: Run Prisma Migrations
        run: cd apps/api && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mhc_test

      - name: Run Tests
        run: npx turbo test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mhc_test

      - name: Build
        run: npx turbo build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mhc_test
