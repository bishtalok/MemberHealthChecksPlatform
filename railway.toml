[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run build --workspace=packages/shared-types && npx prisma generate --schema=apps/api/prisma/schema.prisma && npm run build --workspace=apps/api"

[deploy]
startCommand = "npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss && node apps/api/dist/main"
healthcheckPath = "/api/docs"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
